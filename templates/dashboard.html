/* ===== MODULE 1 VISUAL POLISH ===== */
#module1Section {
    display: grid;
    grid-template-columns: 1.28fr 0.92fr 0.92fr;
    gap: 22px;
    margin-top: 40px;
    padding: 30px 35px 15px;
    align-items: stretch;
}

.module1-card {
    background: transparent;
    border: none;
    box-shadow: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    padding: 10px 15px;
}

.module1-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 34px rgba(90, 50, 50, 0.14);
}

.text-card {
    min-height: 460px;
}

.text-card h2,
#jobTitle {
    font-size: 34px;
    line-height: 1.22;
    color: #373368;
    margin-bottom: 18px;
    letter-spacing: 0.2px;
}

.text-card p,
.dashboard-left p {
    font-size: 18px;
    color: #2f2f2f;
    margin-bottom: 26px;
}

.text-card h3,
.dashboard-left h3 {
    font-size: 21px;
    color: #373368;
    margin: 26px 0 14px;
}

#matchedSkills,
#missingSkills {
    list-style: none;
    padding-left: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 10px;
}

#matchedSkills li {
    background: linear-gradient(135deg, #dcf7e9, #c9efd9);
    color: #1f7a4a;
    padding: 9px 16px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    box-shadow: 0 4px 10px rgba(31, 122, 74, 0.08);
}

#missingSkills li {
    background: linear-gradient(135deg, #fde9e9, #f8d7d7);
    color: #a12b2b;
    padding: 9px 16px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    box-shadow: 0 4px 10px rgba(161, 43, 43, 0.08);
}

.chart-card {
    min-height: 460px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px;
}

#donutChart,
#barChart {
    width: 100%;
    max-width: 100%;
    min-height: 360px;
    border-radius: 20px;
    padding: 6px;
    margin-left: 0;
}

/* keep chart order as you already wanted */
#module1Section .module1-card:nth-child(2) {
    order: 3;
}

#module1Section .module1-card:nth-child(3) {
    order: 2;
}

/* ---------- MODULE 2 REFINED LAYOUT ---------- */
#module2Section {
    display: none;
    padding: 110px 70px 40px;
    animation: fadeInUp 0.6s ease;
}

.module2-title {
    text-align: center;
    font-size: 34px;
    color: #373368;
    margin-bottom: 30px;
    font-family: 'Times New Roman', Times, serif;
}

.module2-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 26px;
    max-width: 1150px;
    margin: 0 auto 35px auto;
}

.module2-role-card {
    background: rgba(255, 244, 244, 0.22);
    border: 1px solid rgba(120, 70, 70, 0.10);
    border-radius: 24px;
    padding: 24px 22px;
    box-shadow: 0 8px 22px rgba(90, 50, 50, 0.06);
    text-align: center;
}

.module2-rank {
    font-size: 15px;
    font-weight: 700;
    color: #7b4b4b;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
}

.module2-role-name {
    font-size: 24px;
    font-weight: 700;
    color: #373368;
    margin-bottom: 12px;
    line-height: 1.3;
}

.module2-role-score {
    font-size: 28px;
    font-weight: 700;
    color: #2e7db2;
    margin-bottom: 8px;
}

.module2-role-label {
    font-size: 14px;
    color: #5b4b4b;
}

.module2-chart-wrapper {
    max-width: 980px;
    margin: 0 auto;
}

#roleBarChart {
    width: 100%;
    height: 480px;
}


.module2-why-title {
    margin-top: 16px;
    margin-bottom: 10px;
    font-size: 15px;
    font-weight: 700;
    color: #5e4a4a;
}

.module2-skill-tags {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.module2-skill-tags span {
    background: rgba(215, 245, 229, 0.92);
    color: #1f7a4a;
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(31, 122, 74, 0.05);
}

.module2-role-card {
    background: rgba(255, 244, 244, 0.22);
    border: 1px solid rgba(120, 70, 70, 0.10);
    border-radius: 24px;
    padding: 24px 22px;
    box-shadow: 0 8px 22px rgba(90, 50, 50, 0.06);
    text-align: center;
    opacity: 0;
    transform: translateY(30px);
    animation: module2CardRise 0.7s ease forwards;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.module2-role-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 14px 28px rgba(90, 50, 50, 0.12);
}

.module2-role-card:nth-child(1) {
    animation-delay: 0.08s;
}

.module2-role-card:nth-child(2) {
    animation-delay: 0.18s;
}

.module2-role-card:nth-child(3) {
    animation-delay: 0.28s;
}

.module2-chart-wrapper {
    max-width: 980px;
    margin: 0 auto;
    opacity: 0;
    transform: translateY(24px);
    animation: module2ChartFade 0.8s ease forwards;
    animation-delay: 0.4s;
}

@keyframes module2CardRise {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes module2ChartFade {
    from {
        opacity: 0;
        transform: translateY(24px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

<script>
/* ---------- NAVIGATION ---------- */

function goToAIInterviewer() {
     console.log("Interview button clicked");   // 👈 ADD THIS
    const context = JSON.parse(localStorage.getItem("interviewContext"));

    // If no context (Module 3 or navbar)
    if (!context || context.source === "module3") {
        window.location.href = "/interview";
        return;
    }

    // ---------- MODULE 1 ----------
    if (context.source === "module1") {
        fetch("/api/interview/context", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                job_role: context.jobRole
            })
        }).then(() => {
            window.location.href = "{{ url_for('interview') }}";
        });
    }

    // ---------- MODULE 2 ----------
    else if (context.source === "module2") {
        fetch("/api/interview/context", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                roles: context.roles
            })
        }).then(() => {
            window.location.href = "{{ url_for('interview') }}";
        });
    }
}

/* ---------- VISIBILITY CONTROL ---------- */
function hideAllModules() {
    document.getElementById("module1Section").style.display = "none";
    document.getElementById("module2Section").style.display = "none";
    document.getElementById("module3Section").style.display = "none";
}

/* ---------- MODULE 1 ---------- */
function renderModule1(data) {
    if (!data) return;

    hideAllModules();
    document.getElementById("module1Section").style.display = "grid";

    document.getElementById("jobRole").innerText = data.job_role;
    document.getElementById("jobTitle").innerText =
        "Skill Match Overview – " + data.job_role;

    matchedSkills.innerHTML = "";
    missingSkills.innerHTML = "";

    data.matched_skills.forEach(s => {
        const li = document.createElement("li");
        li.textContent = s;
        matchedSkills.appendChild(li);
    });

    data.missing_skills.forEach(s => {
        const li = document.createElement("li");
        li.textContent = s;
        missingSkills.appendChild(li);
    });

    /*Plotly.newPlot("donutChart", [{
    labels: ["Matched Skills", "Missing Skills"],
    values: [data.matched_skills.length, data.missing_skills.length],
    hole: 0.55,
    type: "pie"
}], {
    paper_bgcolor: "rgba(0,0,0,0)",
    plot_bgcolor: "rgba(0,0,0,0)",
    margin: { t: 40, b: 40 }
});*/

Plotly.newPlot("donutChart", [{
    labels: ["Matched Skills", "Missing Skills"],
    values: [data.matched_skills.length, data.missing_skills.length],
    hole: 0.58,
    type: "pie",
    textinfo: "percent",
    textfont: { size: 18 }
}], {
    paper_bgcolor: "rgba(0,0,0,0)",
    plot_bgcolor: "rgba(0,0,0,0)",
    margin: { t: 30, b: 30, l: 20, r: 20 },
    showlegend: true
}, {
    displayModeBar: false,
    responsive: true
});


   /*Plotly.newPlot("barChart", [{
    x: ["Matched Skills", "Missing Skills"],
    y: [data.matched_skills.length, data.missing_skills.length],
    type: "bar"
}], {
    paper_bgcolor: "rgba(0,0,0,0)",
    plot_bgcolor: "rgba(0,0,0,0)",
    margin: { t: 40, b: 40 }
});

localStorage.setItem("interviewContext", JSON.stringify({
    source: "module1",
    jobRole: data.job_role
}));*/

Plotly.newPlot("barChart", [{
    x: ["Matched Skills", "Missing Skills"],
    y: [data.matched_skills.length, data.missing_skills.length],

    type: "bar",

    // ✅ FIX COLORS
    marker: {
        color: ["#E67E22", "#2E7DB2"]   // blue, orange
    },

    // ✅ SHOW VALUES ON TOP
    text: [
        data.matched_skills.length,
        data.missing_skills.length
    ],
    textposition: "outside",

}], {
    paper_bgcolor: "rgba(0,0,0,0)",
    plot_bgcolor: "rgba(0,0,0,0)",

    // ✅ FIX CUTTING ISSUE
    margin: { t: 10, b: 20 },

    // ✅ PREVENT CLIPPING
    yaxis: {
        automargin: true
    }
});


}

/* ---------- MODULE 2 ---------- */
function renderModule2(roleData) {
    if (!roleData) return;

    hideAllModules();
    document.getElementById("module2Section").style.display = "block";

    const roles = roleData.map(r => r["Job Role"]);
    const scores = roleData.map(r => +(r.score * 100).toFixed(1));

    const cardsContainer = document.getElementById("module2Cards");

    const labels = ["Best Match", "Strong Fit", "Good Option"];

    cardsContainer.innerHTML = roleData.map((role, index) => `
    <div class="module2-role-card">
        <div class="module2-rank">#${index + 1} • ${labels[index] || "Recommended"}</div>
        <div class="module2-role-name">${role["Job Role"]}</div>
        <div class="module2-role-score">${(role.score * 100).toFixed(1)}%</div>
        <div class="module2-role-label">Resume match score</div>

        <div class="module2-why-title">Why this role suits you</div>
        <div class="module2-skill-tags">
            ${
                role.matched_skills && role.matched_skills.length > 0
                ? role.matched_skills.map(skill => `<span>${skill}</span>`).join("")
                : `<span>good skill overlap</span>`
            }
        </div>
    </div>
`).join("");

    Plotly.newPlot("roleBarChart", [{
        x: scores,
        y: roles,
        orientation: "h",
        type: "bar",
        text: scores.map(s => `${s}%`),
        textposition: "outside",
        marker: {
            color: ["#2E7DB2", "#5A4FCF", "#E67E22"]
        },
        hovertemplate: "%{y}<br>Match Score: %{x}%<extra></extra>"
    }], {
        paper_bgcolor: "rgba(0,0,0,0)",
        plot_bgcolor: "rgba(0,0,0,0)",
        margin: { l: 170, r: 40, t: 30, b: 40 },
        xaxis: {
            title: "Match Score (%)",
            range: [0, Math.max(...scores) + 10],
            showgrid: true,
            gridcolor: "rgba(120,120,120,0.12)",
            zeroline: false
        },
        yaxis: {
            automargin: true,
            autorange: "reversed"
        },
        showlegend: false
    }, {
        displayModeBar: false,
        responsive: true
    });

    localStorage.setItem("interviewContext", JSON.stringify({
        source: "module2",
        roles: roles
    }));
}

function showModule3Tab(tabName, clickedButton) {
    document.getElementById("module3Overview").style.display = "none";
    document.getElementById("module3Reasons").style.display = "none";
    document.getElementById("module3Charts").style.display = "none";
    document.getElementById("module3Insights").style.display = "none";

    document.querySelectorAll(".module3-tab").forEach(btn => {
        btn.classList.remove("active");
    });

    if (tabName === "overview") {
        document.getElementById("module3Overview").style.display = "block";
    }
    if (tabName === "reasons") {
        document.getElementById("module3Reasons").style.display = "block";
    }
    if (tabName === "charts") {
        document.getElementById("module3Charts").style.display = "block";

        setTimeout(() => {
            Plotly.Plots.resize("radarChart");
            Plotly.Plots.resize("importanceChart");
            Plotly.Plots.resize("shapChart");
        }, 100);
    }
    if (tabName === "insights") {
        document.getElementById("module3Insights").style.display = "block";
    }

    if (clickedButton) {
        clickedButton.classList.add("active");
    }
}

/* ---------- MODULE 3 ---------- */
function renderModule3(data) {
    if (!data) return;

    hideAllModules();
    document.getElementById("module3Section").style.display = "block";

    localStorage.setItem("interviewContext", JSON.stringify({
        source: "module3"
    }));

    document.getElementById("module3Overview").innerHTML = `
    <div style="background:#ffffff;padding:30px;border-radius:14px;box-shadow:0 8px 25px rgba(0,0,0,0.08);">
        <h2 style="text-align:center;margin-bottom:25px;">📌 Final Resume Analysis</h2>

        <div style="display:flex;justify-content:space-around;margin-bottom:30px;font-size:18px;">
            <div><strong>Selection Probability</strong><br>${data.probability.toFixed(1)}%</div>
            <div><strong>JD Similarity</strong><br>${data.jd_similarity.toFixed(2)}%</div>
            <div><strong>Keyword Coverage</strong><br>${data.keyword_coverage.toFixed(2)}%</div>
        </div>

        <hr style="margin:30px 0;">

        <h3>✅ Matched Keywords</h3>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:25px;">
            ${data.matched_keywords.map(k =>
                `<span style="background:#d7f5e5;color:#1f7a4a;padding:6px 12px;border-radius:20px;font-size:14px;">${k}</span>`
            ).join("")}
        </div>

        <h3>❌ Missing Keywords</h3>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;">
            ${data.missing_keywords.map(k =>
                `<span style="background:#fde2e2;color:#a12b2b;padding:6px 12px;border-radius:20px;font-size:14px;">${k}</span>`
            ).join("")}
        </div>
    </div>
    `;

    document.getElementById("module3Reasons").innerHTML = `
    <div style="background:#ffffff;padding:30px;border-radius:14px;box-shadow:0 8px 25px rgba(0,0,0,0.08);">

        <h3>🧠 Why Your Resume Was Weak</h3>

        ${data.reasons.map(r => `
            <div style="padding:15px;margin-bottom:15px;border-left:6px solid ${
                r.severity === "HIGH" ? "#d93025" :
                r.severity === "MEDIUM" ? "#f9ab00" : "#188038"
            };background:#fafafa;border-radius:6px;">
                <strong>${r.category}</strong><br>
                <small>${r.reason}</small><br><br>
                <strong>Fix:</strong> ${r.fix}
            </div>
        `).join("")}

        <hr style="margin:30px 0;">

        <h3>🛣️ Improvement Roadmap</h3>

        <table style="width:100%;border-collapse:collapse;">
            <thead>
                <tr style="background:#f1f3f4;">
                    <th style="padding:10px;border:1px solid #ddd;">Step</th>
                    <th style="padding:10px;border:1px solid #ddd;">Priority</th>
                    <th style="padding:10px;border:1px solid #ddd;">Area</th>
                    <th style="padding:10px;border:1px solid #ddd;">Action</th>
                </tr>
            </thead>
            <tbody>
                ${data.roadmap.map(row => `
                    <tr>
                        <td style="padding:8px;border:1px solid #ddd;">${row.Step}</td>
                        <td style="padding:8px;border:1px solid #ddd;">${row.Priority}</td>
                        <td style="padding:8px;border:1px solid #ddd;">${row.Area}</td>
                        <td style="padding:8px;border:1px solid #ddd;">${row.Action}</td>
                    </tr>
                `).join("")}
            </tbody>
        </table>
    </div>
    `;

    document.getElementById("module3Insights").innerHTML = `
    <div style="background:#ffffff;padding:30px;border-radius:14px;box-shadow:0 8px 25px rgba(0,0,0,0.08);">
        <h3>🧠 Key Model Insights</h3>
        <ul style="margin-bottom:30px;">
            ${data.intelligent_insights.map(i => `
                <li style="margin-bottom:10px;">${i}</li>
            `).join("")}
        </ul>
    </div>
    `;

    const radar = JSON.parse(data.radar_chart);
    Plotly.newPlot("radarChart", radar.data, radar.layout, {
        displayModeBar: false,
        responsive: true
    });

    const importance = JSON.parse(data.importance_chart);
    Plotly.newPlot("importanceChart", importance.data, importance.layout, {
        displayModeBar: false,
        responsive: true
    });

    const shap = JSON.parse(data.shap_chart);
    Plotly.newPlot("shapChart", shap.data, shap.layout, {
        displayModeBar: false,
        responsive: true
    });

    const shapNote = document.getElementById("shapPositiveNote");

if (data.has_positive_shap) {
    shapNote.style.display = "none";
    shapNote.innerText = "";
} else {
    shapNote.style.display = "block";
    shapNote.innerText = "No strong positive feature contributions found for this resume.";
}

    document.getElementById("module3Overview").style.display = "block";
    document.getElementById("module3Reasons").style.display = "none";
    document.getElementById("module3Charts").style.display = "none";
    document.getElementById("module3Insights").style.display = "none";

    document.querySelectorAll(".module3-tab").forEach(btn => btn.classList.remove("active"));
    document.querySelector(".module3-tab").classList.add("active");
}

/* ---------- INIT ---------- */
document.addEventListener("DOMContentLoaded", function () {
    const activeModule = localStorage.getItem("activeModule");

    if (activeModule === "module1") {
        renderModule1(JSON.parse(localStorage.getItem("skillGapResult")));
    }

    if (activeModule === "module2") {
        renderModule2(JSON.parse(localStorage.getItem("roleMatchResult")));
    }

    if (activeModule === "module3") {
        renderModule3(JSON.parse(localStorage.getItem("rejectionResult")));
    }

    
});

function toggleUserMenu(event) {
    event.stopPropagation();
    const dropdown = document.getElementById("userDropdown");
    if (dropdown) {
        dropdown.classList.toggle("show");
    }
}

document.addEventListener("click", function () {
    const dropdown = document.getElementById("userDropdown");
    if (dropdown) {
        dropdown.classList.remove("show");
    }
});
</script>

</body>
</html>
